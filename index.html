<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Timebank</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #ebebea;
    --text: #1a1a19;
    --text2: #6b6b68;
    --text3: #9a9a97;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 8px;
    --radius-lg: 12px;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-dark: #0C447C;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --green: #3B6D11;
    --green-light: #EAF3DE;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #f0f0ee;
      --text2: #a0a09d;
      --text3: #6b6b68;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
      --blue: #5ca0d8;
      --blue-light: #0c2e4a;
      --blue-dark: #85b7eb;
      --teal: #3dcca0;
      --teal-light: #052e22;
      --amber: #f5b942;
      --amber-light: #2e1e04;
      --red: #f07070;
      --red-light: #2e0f0f;
      --green: #7fc444;
      --green-light: #162604;
    }
  }

  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; line-height: 1.6; }

  .app { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
  .app-title { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 500; color: var(--text); }
  .app-title i { font-size: 22px; color: var(--blue); }

  .program-selector { display: flex; align-items: center; gap: 8px; }
  .program-selector label { font-size: 13px; color: var(--text2); }
  .program-selector select { font-size: 14px; padding: 6px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); cursor: pointer; }

  .tab-bar { display: flex; gap: 2px; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; }
  .tab { padding: 9px 16px; font-size: 14px; cursor: pointer; border: none; background: transparent; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -0.5px; white-space: nowrap; border-radius: 0; font-family: inherit; }
  .tab.active { color: var(--text); border-bottom: 2px solid var(--blue); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text); background: var(--bg2); }

  .section-title { font-size: 17px; font-weight: 500; margin-bottom: 1rem; color: var(--text); }

  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }

  .metric-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: 1rem; }
  .metric-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .metric-value { font-size: 24px; font-weight: 500; }
  .metric-value.blue { color: var(--blue); }
  .metric-value.teal { color: var(--teal); }
  .metric-value.amber { color: var(--amber); }

  .form-group { margin-bottom: 1rem; }
  .form-label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 5px; }
  input[type=text], input[type=number], input[type=date], select, textarea {
    width: 100%; padding: 8px 10px; font-size: 14px; font-family: inherit;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg); color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(24,95,165,0.15); }
  textarea { resize: vertical; line-height: 1.5; }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 20px; font-size: 14px; border-radius: var(--radius); cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.15s; border: none; }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: var(--blue-dark); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .banner { border-radius: var(--radius); padding: 10px 14px; font-size: 14px; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .banner-success { background: var(--teal-light); color: var(--teal); border: 0.5px solid var(--teal); }
  .banner-error { background: var(--red-light); color: var(--red); border: 0.5px solid var(--red); }
  .banner-info { background: var(--blue-light); color: var(--blue-dark); border: 0.5px solid var(--blue); }

  table { width: 100%; font-size: 13px; border-collapse: collapse; table-layout: fixed; }
  th { text-align: left; font-size: 12px; font-weight: 500; color: var(--text2); padding: 6px 8px; border-bottom: 0.5px solid var(--border); }
  td { padding: 8px 8px; border-bottom: 0.5px solid var(--border); color: var(--text); vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg2); }

  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .badge-work { background: var(--blue-light); color: var(--blue-dark); }
  .badge-request { background: var(--amber-light); color: var(--amber); }

  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--blue-light); display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: var(--blue-dark); flex-shrink: 0; }

  .leaderboard-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .leaderboard-row:last-child { border-bottom: none; }
  .rank { font-size: 13px; font-weight: 500; color: var(--text2); width: 22px; flex-shrink: 0; }
  .rank.gold { color: #BA7517; }
  .rank.silver { color: #888780; }
  .rank.bronze { color: #993C1D; }
  .student-name { flex: 1; font-size: 14px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-wrap { width: 110px; height: 8px; background: var(--bg3); border-radius: 99px; overflow: hidden; flex-shrink: 0; }
  .bar-fill { height: 100%; background: var(--blue); border-radius: 99px; }
  .hour-label { font-size: 13px; font-weight: 500; width: 52px; text-align: right; flex-shrink: 0; color: var(--text); }

  .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
  .filter-row label { font-size: 13px; color: var(--text2); white-space: nowrap; }
  .filter-row select { flex: 1; min-width: 160px; }

  .empty { color: var(--text3); font-size: 14px; text-align: center; padding: 2.5rem 1rem; }

  .loading { display: flex; align-items: center; gap: 10px; color: var(--text2); font-size: 14px; padding: 1.5rem 0; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .refresh-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .refresh-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text2); background: none; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 4px 10px; cursor: pointer; font-family: inherit; }
  .refresh-btn:hover { color: var(--text); border-color: var(--border2); }

  .last-updated { font-size: 12px; color: var(--text3); }

  .toggle-row { display: flex; gap: 8px; margin-bottom: 1rem; }
  .toggle-btn { padding: 5px 14px; font-size: 13px; border-radius: 99px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-family: inherit; }
  .toggle-btn.active { background: var(--blue); color: white; border-color: var(--blue); }

  @media (max-width: 480px) {
    .app { padding: 1rem 0.75rem 3rem; }
    .metric-value { font-size: 20px; }
    .bar-wrap { width: 70px; }
  }

  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
</style>
</head>
<body>
<div class="app" role="main">
  <h1 class="sr-only">Project Timebank — log hours, view history, and see the leaderboard</h1>

  <div class="app-header">
    <div class="app-title">
      <i class="ti ti-clock-bolt" aria-hidden="true"></i>
      Project Timebank
    </div>
    <div class="program-selector">
      <label for="program-select">Program:</label>
      <select id="program-select" onchange="onProgramChange()">
        <option value="JLS">JLS</option>
        <option value="KYTI">KYTI</option>
        <option value="Kenya">Kenya</option>
        <option value="CAYEO">CAYEO</option>
        <option value="Moshi">Moshi</option>
      </select>
    </div>
  </div>

  <div class="tab-bar" role="tablist" aria-label="App sections">
    <button class="tab active" onclick="showTab('give')" role="tab" aria-selected="true" id="tab-btn-give">Give &amp; Get</button>
    <button class="tab" onclick="showTab('my')" role="tab" aria-selected="false" id="tab-btn-my">My history</button>
    <button class="tab" onclick="showTab('board')" role="tab" aria-selected="false" id="tab-btn-board">Leaderboard</button>
    <button class="tab" onclick="showTab('admin')" role="tab" aria-selected="false" id="tab-btn-admin">Admin view</button>
  </div>

  <!-- GIVE & GET TAB -->
  <div id="tab-give">
    <p class="section-title">Log work hours or request an item</p>
    <div id="give-banner" style="display:none;"></div>
    <div class="card">
      <div class="form-group">
        <label class="form-label" for="f-name">Your name</label>
        <input id="f-name" type="text" placeholder="First and last name" autocomplete="name" />
      </div>
      <div class="form-group">
        <label class="form-label" for="f-type">Entry type</label>
        <select id="f-type" onchange="toggleFields()">
          <option value="work">Log work hours</option>
          <option value="request">Request an item</option>
        </select>
      </div>

      <div id="work-fields">
        <div class="form-group">
          <label class="form-label" for="f-date">Date of work</label>
          <input id="f-date" type="date" />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-hours">Hours worked</label>
          <input id="f-hours" type="number" min="0.5" max="12" step="0.5" placeholder="e.g. 2" />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-desc">What did you work on?</label>
          <textarea id="f-desc" rows="2" placeholder="Brief description of your work…"></textarea>
        </div>
      </div>

      <div id="request-fields" style="display:none;">
        <div class="form-group">
          <label class="form-label" for="f-item">Item you want</label>
          <input id="f-item" type="text" placeholder="e.g. Gift card, Book, Supply kit…" />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-cost">Hour cost of item</label>
          <input id="f-cost" type="number" min="0.5" step="0.5" placeholder="Hours to spend" />
        </div>
        <div id="balance-preview" style="display:none; margin-bottom:1rem;">
          <div class="banner banner-info" id="balance-text"></div>
        </div>
      </div>

      <button class="btn btn-primary" id="submit-btn" onclick="submitEntry()">
        <i class="ti ti-send" aria-hidden="true"></i> Submit
      </button>
    </div>
  </div>

  <!-- MY HISTORY TAB -->
  <div id="tab-my" style="display:none;">
    <div class="refresh-row">
      <p class="section-title" style="margin:0;">My history</p>
      <button class="refresh-btn" onclick="loadData(true)"><i class="ti ti-refresh" aria-hidden="true"></i> Refresh</button>
    </div>
    <div class="filter-row">
      <label for="my-filter">Your name:</label>
      <select id="my-filter" onchange="renderMyHistory()">
        <option value="">— Select your name —</option>
      </select>
    </div>
    <div id="my-metrics" class="metric-row" style="display:none;"></div>
    <div class="card" id="my-table-wrap">
      <div class="empty">Select your name above to see your history.</div>
    </div>
  </div>

  <!-- LEADERBOARD TAB -->
  <div id="tab-board" style="display:none;">
    <div class="refresh-row">
      <p class="section-title" style="margin:0;">Leaderboard</p>
      <button class="refresh-btn" onclick="loadData(true)"><i class="ti ti-refresh" aria-hidden="true"></i> Refresh</button>
    </div>
    <div class="toggle-row">
      <button class="toggle-btn active" id="sort-hrs" onclick="setSortMode('hours')">By hours</button>
      <button class="toggle-btn" id="sort-name" onclick="setSortMode('name')">By name</button>
    </div>
    <div class="card" id="leaderboard-list"><div class="empty">Loading…</div></div>
    <div style="margin-top:1rem; position:relative; width:100%;" id="chart-wrap">
      <canvas id="board-chart" role="img" aria-label="Bar chart of total hours earned by each student"></canvas>
    </div>
  </div>

  <!-- ADMIN TAB -->
  <div id="tab-admin" style="display:none;">
    <div class="refresh-row">
      <p class="section-title" style="margin:0;">All activity</p>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="last-updated" id="last-updated"></span>
        <button class="refresh-btn" onclick="loadData(true)"><i class="ti ti-refresh" aria-hidden="true"></i> Refresh</button>
      </div>
    </div>
    <div class="metric-row" id="admin-metrics"></div>
    <div class="filter-row">
      <label for="admin-filter">Filter by student:</label>
      <select id="admin-filter" onchange="renderAdmin()">
        <option value="">All students</option>
      </select>
    </div>
    <div class="card" style="overflow-x:auto;">
      <table id="admin-table" style="table-layout:fixed;">
        <colgroup>
          <col style="width:88px;">
          <col style="width:120px;">
          <col style="width:72px;">
          <col>
          <col style="width:52px;">
        </colgroup>
        <thead><tr><th>Date</th><th>Student</th><th>Type</th><th>Detail</th><th>Hrs</th></tr></thead>
        <tbody id="admin-tbody"><tr><td colspan="5"><div class="empty">Loading…</div></td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyhW3YgT-vcmZli3XdNUV_Tei_CLz7nF1knOEXatYM_0NQXXS8BOlX9wB4QaU3Ermnmnw/exec";

let allEntries = [];
let currentProgram = "JLS";
let sortMode = "hours";
let boardChart = null;
let lastLoaded = null;
let loading = false;

function getProgram() {
  return document.getElementById("program-select").value;
}

function onProgramChange() {
  currentProgram = getProgram();
  allEntries = [];
  lastLoaded = null;
  const activeTab = document.querySelector(".tab.active")?.id?.replace("tab-btn-","") || "give";
  if (activeTab !== "give") loadData(true);
  if (activeTab === "my") { populateFilters(); renderMyHistory(); }
  if (activeTab === "board") renderLeaderboard();
  if (activeTab === "admin") { populateFilters(); renderAdmin(); }
}

async function loadData(force) {
  if (loading) return;
  if (!force && allEntries.length > 0) return;
  loading = true;
  const program = getProgram();
  try {
    const res = await fetch(`${SCRIPT_URL}?program=${program}`);
    const json = await res.json();
    if (json.success) {
      allEntries = json.entries || [];
      lastLoaded = new Date();
      const lu = document.getElementById("last-updated");
      if (lu) lu.textContent = "Updated " + lastLoaded.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    }
  } catch(e) {
    console.error("Load error:", e);
  }
  loading = false;
  const activeTab = document.querySelector(".tab.active")?.id?.replace("tab-btn-","") || "give";
  if (activeTab === "my") { populateFilters(); renderMyHistory(); }
  if (activeTab === "board") renderLeaderboard();
  if (activeTab === "admin") { populateFilters(); renderAdmin(); }
}

function showTab(t) {
  ["give","my","board","admin"].forEach(id => {
    document.getElementById("tab-"+id).style.display = id===t ? "" : "none";
    const btn = document.getElementById("tab-btn-"+id);
    if (btn) { btn.classList.toggle("active", id===t); btn.setAttribute("aria-selected", id===t); }
  });
  if (t !== "give") loadData(false);
  if (t === "my") populateFilters();
  if (t === "admin") populateFilters();
}

function toggleFields() {
  const v = document.getElementById("f-type").value;
  document.getElementById("work-fields").style.display = v==="work" ? "" : "none";
  document.getElementById("request-fields").style.display = v==="request" ? "" : "none";
  if (v==="request") updateBalancePreview();
}

function updateBalancePreview() {
  const name = document.getElementById("f-name").value.trim();
  const preview = document.getElementById("balance-preview");
  const balText = document.getElementById("balance-text");
  if (!name) { preview.style.display="none"; return; }
  const bal = getBalance(name);
  preview.style.display = "";
  balText.textContent = `${name}'s current balance: ${bal.toFixed(1)} hrs`;
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("f-date").value = new Date().toISOString().split("T")[0];
  document.getElementById("f-name").addEventListener("input", () => {
    if (document.getElementById("f-type").value === "request") updateBalancePreview();
  });
});

function getBalances() {
  const b = {};
  allEntries.forEach(e => { b[e.name] = (b[e.name]||0) + e.hours; });
  return b;
}

function getBalance(name) {
  return allEntries.filter(e=>e.name===name).reduce((s,e)=>s+e.hours,0);
}

function initials(name) {
  return (name||"?").split(" ").filter(Boolean).map(w=>w[0].toUpperCase()).join("").slice(0,2);
}

function showBanner(id, type, msg) {
  const el = document.getElementById(id);
  el.className = "banner banner-"+type;
  el.innerHTML = `<i class="ti ti-${type==="success"?"circle-check":type==="error"?"alert-circle":"info-circle"}" aria-hidden="true"></i> ${msg}`;
  el.style.display = "flex";
  if (type==="success") setTimeout(()=>{ el.style.display="none"; }, 4000);
}

async function submitEntry() {
  const btn = document.getElementById("submit-btn");
  const name = document.getElementById("f-name").value.trim();
  const type = document.getElementById("f-type").value;
  const program = getProgram();

  if (!name) { showBanner("give-banner","error","Please enter your name."); return; }

  let payload = { program, name, type };

  if (type==="work") {
    const date = document.getElementById("f-date").value;
    const hrs = parseFloat(document.getElementById("f-hours").value);
    const desc = document.getElementById("f-desc").value.trim();
    if (!date) { showBanner("give-banner","error","Please select a date."); return; }
    if (!hrs || hrs <= 0) { showBanner("give-banner","error","Please enter hours worked."); return; }
    if (!desc) { showBanner("give-banner","error","Please describe what you worked on."); return; }
    payload.detail = desc;
    payload.hours = hrs;
    payload.date = date;
  } else {
    const item = document.getElementById("f-item").value.trim();
    const cost = parseFloat(document.getElementById("f-cost").value);
    if (!item) { showBanner("give-banner","error","Please enter the item you want."); return; }
    if (!cost || cost <= 0) { showBanner("give-banner","error","Please enter the hour cost."); return; }
    const bal = getBalance(name);
    if (cost > bal) {
      showBanner("give-banner","error",`Not enough hours. ${name}'s balance is ${bal.toFixed(1)} hrs but this costs ${cost} hrs.`);
      return;
    }
    payload.detail = "Requested: " + item;
    payload.hours = -cost;
  }

  btn.disabled = true;
  btn.innerHTML = `<span class="spinner" aria-hidden="true"></span> Submitting…`;

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    // Optimistically add to local entries
    allEntries.unshift({
      id: Date.now(),
      date: payload.date || new Date().toISOString().split("T")[0],
      name: payload.name,
      type: payload.type,
      detail: payload.detail,
      hours: payload.hours
    });

    showBanner("give-banner","success","Submitted! Your entry has been recorded.");
    document.getElementById("f-hours").value = "";
    document.getElementById("f-desc").value = "";
    document.getElementById("f-item").value = "";
    document.getElementById("f-cost").value = "";
    document.getElementById("balance-preview").style.display = "none";

  } catch(e) {
    showBanner("give-banner","error","Submission failed. Please check your connection and try again.");
  }

  btn.disabled = false;
  btn.innerHTML = `<i class="ti ti-send" aria-hidden="true"></i> Submit`;
}

function populateFilters() {
  const names = [...new Set(allEntries.map(e=>e.name))].filter(Boolean).sort();
  ["my-filter","admin-filter"].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const current = sel.value;
    const placeholder = id==="my-filter" ? "— Select your name —" : "All students";
    sel.innerHTML = `<option value="">${placeholder}</option>`;
    names.forEach(n => {
      const o = document.createElement("option");
      o.value = n; o.textContent = n;
      if (n===current) o.selected = true;
      sel.appendChild(o);
    });
  });
}

function renderMyHistory() {
  const name = document.getElementById("my-filter").value;
  const metricsEl = document.getElementById("my-metrics");
  const tableEl = document.getElementById("my-table-wrap");

  if (!name) {
    metricsEl.style.display = "none";
    tableEl.innerHTML = `<div class="empty">Select your name above to see your history.</div>`;
    return;
  }

  const mine = allEntries.filter(e=>e.name===name);
  const earned = mine.filter(e=>e.hours>0).reduce((s,e)=>s+e.hours,0);
  const spent = Math.abs(mine.filter(e=>e.hours<0).reduce((s,e)=>s+e.hours,0));
  const bal = earned - spent;

  metricsEl.style.display = "grid";
  metricsEl.innerHTML = `
    <div class="metric"><div class="metric-label">Hours earned</div><div class="metric-value teal">${earned.toFixed(1)}</div></div>
    <div class="metric"><div class="metric-label">Hours spent</div><div class="metric-value amber">${spent.toFixed(1)}</div></div>
    <div class="metric"><div class="metric-label">Balance</div><div class="metric-value blue">${bal.toFixed(1)}</div></div>
    <div class="metric"><div class="metric-label">Entries</div><div class="metric-value">${mine.length}</div></div>
  `;

  if (mine.length === 0) {
    tableEl.innerHTML = `<div class="empty">No entries yet for ${name}.</div>`;
    return;
  }

  tableEl.innerHTML = `<table style="table-layout:fixed;">
    <colgroup><col style="width:88px;"><col style="width:72px;"><col><col style="width:52px;"></colgroup>
    <thead><tr><th>Date</th><th>Type</th><th>Detail</th><th>Hrs</th></tr></thead>
    <tbody>${mine.map(e=>`<tr>
      <td>${e.date}</td>
      <td><span class="badge badge-${e.type==="work"?"work":"request"}">${e.type==="work"?"Work":"Request"}</span></td>
      <td title="${e.detail}">${e.detail}</td>
      <td style="font-weight:500;color:${e.hours>0?"var(--teal)":"var(--red)"}">${e.hours>0?"+":""}${e.hours.toFixed(1)}</td>
    </tr>`).join("")}</tbody>
  </table>`;
}

function setSortMode(mode) {
  sortMode = mode;
  document.getElementById("sort-hrs").classList.toggle("active", mode==="hours");
  document.getElementById("sort-name").classList.toggle("active", mode==="name");
  renderLeaderboard();
}

function renderLeaderboard() {
  const balances = getBalances();
  let sorted = Object.entries(balances);
  if (sortMode==="hours") sorted.sort((a,b)=>b[1]-a[1]);
  else sorted.sort((a,b)=>a[0].localeCompare(b[0]));

  const maxHrs = sorted.reduce((m,[,h])=>Math.max(m,h),0) || 1;
  const rankColors = ["gold","silver","bronze"];

  const list = document.getElementById("leaderboard-list");
  if (sorted.length===0) { list.innerHTML=`<div class="empty">No data yet for ${getProgram()}.</div>`; return; }

  list.innerHTML = sorted.map(([name,hrs],i)=>{
    const pct = Math.round((hrs/maxHrs)*100);
    const rc = sortMode==="hours" && i<3 ? rankColors[i] : "";
    return `<div class="leaderboard-row">
      <span class="rank ${rc}">${i+1}</span>
      <div class="avatar" aria-hidden="true">${initials(name)}</div>
      <span class="student-name">${name}</span>
      <div class="bar-wrap" aria-hidden="true"><div class="bar-fill" style="width:${pct}%"></div></div>
      <span class="hour-label">${hrs.toFixed(1)} hrs</span>
    </div>`;
  }).join("");

  const wrap = document.getElementById("chart-wrap");
  const barH = Math.max(sorted.length * 38 + 60, 160);
  wrap.style.height = barH + "px";

  const canvas = document.getElementById("board-chart");
  canvas.setAttribute("aria-label","Bar chart of hours by student: "+sorted.map(([n,h])=>n+" "+h.toFixed(1)).join(", "));

  if (boardChart) boardChart.destroy();
  boardChart = new Chart(canvas, {
    type: "bar",
    data: {
      labels: sorted.map(([n])=>n.split(" ")[0]),
      datasets: [{
        label: "Net hours",
        data: sorted.map(([,h])=>parseFloat(h.toFixed(1))),
        backgroundColor: "#B5D4F4",
        borderColor: "#185FA5",
        borderWidth: 1
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { font:{size:11} } },
        x: { ticks: { font:{size:11}, maxRotation:35, autoSkip:false } }
      }
    }
  });
}

function renderAdmin() {
  const balances = getBalances();
  const names = Object.keys(balances);
  const totalEarned = allEntries.filter(e=>e.hours>0).reduce((s,e)=>s+e.hours,0);
  const requests = allEntries.filter(e=>e.type==="request").length;

  document.getElementById("admin-metrics").innerHTML = `
    <div class="metric"><div class="metric-label">Students</div><div class="metric-value">${names.length}</div></div>
    <div class="metric"><div class="metric-label">Hours logged</div><div class="metric-value teal">${totalEarned.toFixed(1)}</div></div>
    <div class="metric"><div class="metric-label">Requests made</div><div class="metric-value amber">${requests}</div></div>
    <div class="metric"><div class="metric-label">Total entries</div><div class="metric-value">${allEntries.length}</div></div>
  `;

  const filterName = document.getElementById("admin-filter").value;
  const rows = filterName ? allEntries.filter(e=>e.name===filterName) : allEntries;

  const tbody = document.getElementById("admin-tbody");
  if (rows.length===0) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty">No entries yet.</div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(e=>`<tr>
    <td>${e.date}</td>
    <td><div style="display:flex;align-items:center;gap:6px;"><div class="avatar" style="width:22px;height:22px;font-size:10px;" aria-hidden="true">${initials(e.name)}</div><span style="overflow:hidden;text-overflow:ellipsis;">${e.name.split(" ")[0]}</span></div></td>
    <td><span class="badge badge-${e.type==="work"?"work":"request"}">${e.type==="work"?"Work":"Request"}</span></td>
    <td title="${e.detail}">${e.detail}</td>
    <td style="font-weight:500;color:${e.hours>0?"var(--teal)":"var(--red)"}">${e.hours>0?"+":""}${e.hours.toFixed(1)}</td>
  </tr>`).join("");
}
</script>
